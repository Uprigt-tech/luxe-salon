<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Luxe Men Salon</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #0a0a0a;
            --dark-light: #111111;
            --dark-card: #141414;
            --dark-hover: #1a1a1a;
            --gold: #c8a55a;
            --gold-light: #d4b76a;
            --gold-dark: #b8943f;
            --white: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top Bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topbar-icon span {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.04em;
        }

        .topbar-title strong {
            color: var(--white);
            font-weight: 600;
        }

        .btn-logout {
            padding: 10px 22px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
            background: rgba(239, 68, 68, 0.06);
        }

        /* ── Layout Framework ── */
        .layout-wrapper {
            display: flex;
            min-height: calc(100vh - 72px);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid var(--border);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 14px 32px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar-link:hover {
            color: var(--white);
            background: rgba(255, 255, 255, 0.03);
            border-right: 3px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-link.active {
            color: var(--gold);
            background: rgba(200, 165, 90, 0.1);
            border-right: 3px solid var(--gold);
        }

        /* ── Main Content ── */
        .main {
            position: relative;
            z-index: 1;
            padding: 40px 32px;
            max-width: 1400px;
            margin: 0 auto;
            flex-grow: 1;
            width: calc(100% - 250px);
        }

        /* ── Charts Row ── */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 36px;
        }

        .chart-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
        }

        .chart-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 2px;
        }

        .chart-toggle button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-toggle button.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            transition: border-color 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(200, 165, 90, 0.2);
        }

        .stat-label {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--gold);
        }

        /* ── Section Header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--white);
        }

        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(200, 165, 90, 0.08);
            border: 1px solid rgba(200, 165, 90, 0.2);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background: rgba(200, 165, 90, 0.14);
            border-color: rgba(200, 165, 90, 0.4);
        }

        .btn-refresh svg {
            width: 14px;
            height: 14px;
            transition: transform 0.4s ease;
        }

        .btn-refresh:hover svg {
            transform: rotate(180deg);
        }

        /* ── Table Container ── */
        .table-container {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead th {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            text-align: left;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: var(--dark-hover);
        }

        tbody td {
            padding: 16px 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .td-name {
            color: var(--white);
            font-weight: 500;
        }

        .td-phone a {
            color: var(--gold);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .td-phone a:hover {
            opacity: 0.8;
        }

        .td-email {
            color: rgba(255, 255, 255, 0.5);
        }

        .td-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: capitalize;
            background: rgba(200, 165, 90, 0.1);
            color: var(--gold);
            border: 1px solid rgba(200, 165, 90, 0.15);
        }

        .td-message {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .td-date {
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .td-actions {
            display: flex;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .btn-contacted {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border-color: rgba(34, 197, 94, 0.2);
        }

        .btn-contacted:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-contacted {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .status-pending {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        /* ── States ── */
        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

        .state-container svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.12);
            margin-bottom: 20px;
        }

        .state-container p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
        }

        .state-container .error-text {
            color: #f87171;
        }

        /* Spinner */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(200, 165, 90, 0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex-direction: row;
                padding: 16px;
                overflow-x: auto;
            }

            .sidebar-link {
                padding: 8px 16px;
                white-space: nowrap;
                border: none !important;
            }

            .sidebar-link.active {
                border-bottom: 2px solid var(--gold) !important;
            }

            .main {
                width: 100%;
                padding: 24px 16px;
            }

            .topbar {
                padding: 14px 20px;
            }

            .topbar-title {
                display: none;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon"><span>L</span></div>
            <span class="topbar-title"><strong>Luxe Men</strong> &middot; Admin Dashboard</span>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </header>

    <!-- Layout Wrapper -->
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a class="sidebar-link active" id="navDashboard">Dashboard</a>
            <a class="sidebar-link" id="navContacted">Contacted</a>
            <a class="sidebar-link" id="navTickets">Tickets / Issues</a>
        </aside>

        <!-- Main -->
        <main class="main">
            <div id="viewDashboard" class="view-content">
                <!-- Charts -->
                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Enquiries Over Time</div>
                            <div class="chart-toggle" id="chartToggle">
                                <button class="active" data-view="month">Month</button>
                                <button data-view="week">Week</button>
                                <button data-view="day">Day</button>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Enquiry Breakdown</div>
                        </div>
                        <div class="chart-container">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <div class="stat-label">Total Pending</div>
                        <div class="stat-value" id="statTotal">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Franchise</div>
                        <div class="stat-value" id="statFranchise">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Booking</div>
                        <div class="stat-value" id="statBooking">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Partnership</div>
                        <div class="stat-value" id="statPartnership">—</div>
                    </div>
                </div>

                <!-- Table Section -->
                <div class="section-header">
                    <h2 id="tableTitle">Pending Enquiries</h2>
                    <button class="btn-refresh" id="refreshBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10" />
                            <polyline points="1 20 1 14 7 14" />
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                        </svg>
                        Refresh
                    </button>
                </div>

                <div class="table-container">
                    <div id="tableContent">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <div id="viewTickets" class="view-content" style="display: none;">
                <div class="state-container">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>Tickets and Issues portal coming soon</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        const token = localStorage.getItem('adminToken');

        // Auth guard
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        // DOM refs
        const tableContent = document.getElementById('tableContent');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const statTotal = document.getElementById('statTotal');
        const statFranchise = document.getElementById('statFranchise');
        const statBooking = document.getElementById('statBooking');
        const statPartnership = document.getElementById('statPartnership');
        const navDashboard = document.getElementById('navDashboard');
        const navContacted = document.getElementById('navContacted');
        const navTickets = document.getElementById('navTickets');
        const viewDashboard = document.getElementById('viewDashboard');
        const viewTickets = document.getElementById('viewTickets');
        const tableTitle = document.getElementById('tableTitle');

        let allEnquiries = [];
        let currentFilter = 'pending'; // 'pending' or 'contacted'
        let barChartInstance = null;
        let pieChartInstance = null;
        let chartTimeView = 'month'; // 'day', 'week', 'month'

        // Navigation
        function switchTab(tab) {
            navDashboard.classList.remove('active');
            navContacted.classList.remove('active');
            navTickets.classList.remove('active');

            if (tab === 'dashboard') {
                navDashboard.classList.add('active');
                viewDashboard.style.display = 'block';
                viewTickets.style.display = 'none';
                currentFilter = 'pending';
                tableTitle.textContent = 'Pending Enquiries';
                renderTable(allEnquiries); // Re-render table with pending filter
            } else if (tab === 'contacted') {
                navContacted.classList.add('active');
                viewDashboard.style.display = 'block';
                viewTickets.style.display = 'none';
                currentFilter = 'contacted';
                tableTitle.textContent = 'Contacted Enquiries';
                renderTable(allEnquiries); // Re-render table with contacted filter
            } else {
                navTickets.classList.add('active');
                viewDashboard.style.display = 'none';
                viewTickets.style.display = 'block';
            }
        }

        navDashboard.addEventListener('click', () => switchTab('dashboard'));
        navContacted.addEventListener('click', () => switchTab('contacted'));
        navTickets.addEventListener('click', () => switchTab('tickets'));

        // Chart Toggle
        document.querySelectorAll('#chartToggle button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#chartToggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartTimeView = btn.dataset.view;
                initCharts(allEnquiries);
            });
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        });

        // Refresh
        refreshBtn.addEventListener('click', fetchEnquiries);

        // Fetch enquiries
        async function fetchEnquiries() {
            showLoading();

            try {
                const response = await fetch(`${API_BASE}/api/admin/enquiries`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                });

                if (response.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = 'admin-login.html';
                    return;
                }

                const data = await response.json();

                if (response.ok && data.success) {
                    allEnquiries = data.data;
                    updateStats(allEnquiries);
                    renderTable(allEnquiries);
                    initCharts(allEnquiries);
                } else {
                    showError(data.message || 'Failed to load enquiries.');
                }
            } catch {
                showError('Unable to connect to server.');
            }
        }

        // Update stats
        function updateStats(enquiries) {
            const pendingOnly = enquiries.filter(e => e.status !== 'contacted');
            statTotal.textContent = pendingOnly.length;
            statFranchise.textContent = pendingOnly.filter(e => e.enquiryType === 'franchise').length;
            statBooking.textContent = pendingOnly.filter(e => e.enquiryType === 'booking').length;
            statPartnership.textContent = pendingOnly.filter(e => e.enquiryType === 'partnership').length;
        }

        // Initialize Charts
        function initCharts(enquiries) {
            Chart.defaults.color = '#ffffff';
            setupBarChart(enquiries);
            setupPieChart(enquiries);
        }

        function setupPieChart(enquiries) {
            const ctx = document.getElementById('pieChart').getContext('2d');

            if (pieChartInstance) {
                pieChartInstance.destroy();
            }

            const types = {
                'franchise': 0,
                'booking': 0,
                'partnership': 0,
                'other': 0
            };

            enquiries.forEach(e => {
                const type = (e.enquiryType || 'other').toLowerCase();
                if (types[type] !== undefined) types[type]++;
                else types['other']++;
            });

            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Franchise', 'Booking', 'Partnership', 'Other'],
                    datasets: [{
                        data: [types.franchise, types.booking, types.partnership, types.other],
                        backgroundColor: [
                            '#c8a55a',
                            '#b8943f',
                            '#4a4a4a',
                            '#2a2a2a'
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: 'rgba(255, 255, 255, 0.7)',
                                font: { family: 'Inter' }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#ffffff',
                            bodyColor: '#ffffff',
                            callbacks: {
                                labelTextColor: function () { return '#ffffff'; }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        function setupBarChart(enquiries) {
            const ctx = document.getElementById('barChart').getContext('2d');

            if (barChartInstance) {
                barChartInstance.destroy();
            }

            // Group data based on chartTimeView
            const grouped = {};
            const now = new Date();

            enquiries.forEach(e => {
                const date = new Date(e.createdAt);
                let key;

                if (chartTimeView === 'month') {
                    // Group by month for current year
                    if (date.getFullYear() === now.getFullYear()) {
                        key = date.toLocaleString('default', { month: 'short' });
                    }
                } else if (chartTimeView === 'week') {
                    // Group by day of week for current week
                    const diff = now.getTime() - date.getTime();
                    if (diff <= 7 * 24 * 60 * 60 * 1000) {
                        key = date.toLocaleString('default', { weekday: 'short' });
                    }
                } else if (chartTimeView === 'day') {
                    // Group by hour for today
                    if (date.toDateString() === now.toDateString()) {
                        key = `${date.getHours()}:00`;
                    }
                }

                if (key) {
                    grouped[key] = (grouped[key] || 0) + 1;
                }
            });

            // Set fixed labels based on view to ensure consistent x-axis
            let labels = [];
            if (chartTimeView === 'month') {
                labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            } else if (chartTimeView === 'week') {
                labels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            } else if (chartTimeView === 'day') {
                labels = Array.from({ length: 12 }, (_, i) => `${i * 2}:00`); // Bi-hourly for better display
            }

            const data = labels.map(label => {
                if (chartTimeView === 'day') {
                    // Aggregate bi-hourly
                    const hour = parseInt(label);
                    return (grouped[`${hour}:00`] || 0) + (grouped[`${hour + 1}:00`] || 0);
                }
                return grouped[label] || 0;
            });

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Enquiries',
                        data: data,
                        backgroundColor: 'rgba(200, 165, 90, 0.8)',
                        borderRadius: 4,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#ffffff',
                            bodyColor: '#ffffff',
                            callbacks: {
                                labelTextColor: function () { return '#ffffff'; }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)',
                                font: { family: 'Inter', size: 10 }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.5)',
                                font: { family: 'Inter', size: 10 }
                            }
                        }
                    }
                }
            });
        }

        // Action Functions
        async function markContacted(id) {
            try {
                const response = await fetch(`${API_BASE}/api/admin/enquiries/${id}/contacted`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    fetchEnquiries(); // Refresh data
                } else {
                    alert('Failed to update status');
                }
            } catch (error) {
                alert('Server error');
            }
        }

        async function deleteEnquiry(id) {
            if (!confirm('Are you sure you want to delete this enquiry? This action cannot be undone.')) return;

            try {
                const response = await fetch(`${API_BASE}/api/admin/enquiries/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    fetchEnquiries(); // Refresh data
                } else {
                    alert('Failed to delete');
                }
            } catch (error) {
                alert('Server error');
            }
        }

        // Register actions globally so onclick handlers work
        window.markContacted = markContacted;
        window.deleteEnquiry = deleteEnquiry;

        // Render table
        function renderTable(enquiries) {
            const filteredEnquiries = enquiries.filter(e =>
                currentFilter === 'contacted' ? e.status === 'contacted' : e.status !== 'contacted'
            );

            if (filteredEnquiries.length === 0) {
                tableContent.innerHTML = `
          <div class="state-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="18" rx="2" />
              <line x1="2" y1="8" x2="22" y2="8" />
            </svg>
            <p>No ${currentFilter === 'contacted' ? 'contacted' : 'pending'} enquiries</p>
          </div>`;
                return;
            }

            let rows = '';
            filteredEnquiries.forEach(e => {
                const date = new Date(e.createdAt).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                });

                const statusHtml = e.status === 'contacted'
                    ? `<span class="status-badge status-contacted">Contacted</span>`
                    : `<span class="status-badge status-pending">Pending</span>`;

                const actionHtml = currentFilter === 'pending'
                    ? `<button class="btn-action btn-contacted" onclick="markContacted('${e._id}')">Contacted</button>
                       <button class="btn-action btn-delete" onclick="deleteEnquiry('${e._id}')">Delete</button>`
                    : `<button class="btn-action btn-delete" onclick="deleteEnquiry('${e._id}')">Delete</button>`;

                rows += `
          <tr>
            <td class="td-name">${escapeHtml(e.name)}</td>
            <td class="td-phone"><a href="tel:${escapeHtml(e.phone)}">${escapeHtml(e.phone)}</a></td>
            <td class="td-email">${escapeHtml(e.email)}</td>
            <td>${escapeHtml(e.city || '—')}</td>
            <td><span class="td-type">${escapeHtml(e.enquiryType || '—')}</span></td>
            <td class="td-message" title="${escapeHtml(e.message || '')}">${escapeHtml(e.message || '—')}</td>
            <td>${statusHtml}</td>
            <td class="td-date">${date}</td>
            <td class="td-actions">${actionHtml}</td>
          </tr>`;
            });

            tableContent.innerHTML = `
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>City</th>
                <th>Enquiry Type</th>
                <th>Message</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
        }

        // Loading state
        function showLoading() {
            tableContent.innerHTML = `
        <div class="state-container">
          <div class="loading-spinner"></div>
          <p>Loading enquiries...</p>
        </div>`;
        }

        // Error state
        function showError(msg) {
            tableContent.innerHTML = `
        <div class="state-container">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <p class="error-text">${msg}</p>
        </div>`;
        }

        // Escape HTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Initial load
        fetchEnquiries();
    </script>
</body>

</html>
