<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Luxe Men Salon</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dark: #0a0a0a;
      --dark-light: #111111;
      --gold: #c8a55a;
      --gold-light: #d4b76a;
      --gold-dark: #b8943f;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background effects */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(200, 165, 90, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(200, 165, 90, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 48px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(200, 165, 90, 0.2);
    }

    .brand-icon span {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(20px);
    }

    .login-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--white);
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 165, 90, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--dark);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 8px 32px rgba(200, 165, 90, 0.3);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status messages */
    .status-message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .status-message.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
    }

    .status-message.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #4ade80;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10, 10, 10, 0.3);
      border-top-color: var(--dark);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--gold);
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="brand">
      <div class="brand-icon"><span>L</span></div>
      <div class="brand-name">Luxe Men Salon</div>
    </div>

    <div class="login-card">
      <h1>Admin Panel</h1>
      <p>Sign in to manage your salon enquiries</p>

      <div id="statusMessage" class="status-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required
            autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required
            autocomplete="current-password" />
        </div>

        <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
      </form>

      <a href="/" class="back-link">← Back to website</a>
    </div>
  </div>

  <script>
    const form = document.querySelector("form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.querySelector('input[placeholder="Enter username"]').value;
      const password = document.querySelector('input[placeholder="Enter password"]').value;

      try {
        const response = await fetch("https://luxe-salon-1-4vh4.onrender.com/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // save token
          localStorage.setItem("adminToken", data.token);

          // redirect
          window.location.href = "/admin/index.html";
        } else {
          alert("Invalid username or password");
        }

      } catch (error) {
        console.error(error);
        alert("Server error");
      }
    });
  </script>
</body>

</html>
