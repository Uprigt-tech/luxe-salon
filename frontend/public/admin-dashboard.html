<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Luxe Men Salon</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #0a0a0a;
            --dark-light: #111111;
            --dark-card: #141414;
            --dark-hover: #1a1a1a;
            --gold: #c8a55a;
            --gold-light: #d4b76a;
            --gold-dark: #b8943f;
            --white: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top Bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topbar-icon span {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.04em;
        }

        .topbar-title strong {
            color: var(--white);
            font-weight: 600;
        }

        .btn-logout {
            padding: 10px 22px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
            background: rgba(239, 68, 68, 0.06);
        }

        /* ── Main Content ── */
        .main {
            position: relative;
            z-index: 1;
            padding: 40px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            transition: border-color 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(200, 165, 90, 0.2);
        }

        .stat-label {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--gold);
        }

        /* ── Section Header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--white);
        }

        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(200, 165, 90, 0.08);
            border: 1px solid rgba(200, 165, 90, 0.2);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background: rgba(200, 165, 90, 0.14);
            border-color: rgba(200, 165, 90, 0.4);
        }

        .btn-refresh svg {
            width: 14px;
            height: 14px;
            transition: transform 0.4s ease;
        }

        .btn-refresh:hover svg {
            transform: rotate(180deg);
        }

        /* ── Table Container ── */
        .table-container {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead th {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            text-align: left;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: var(--dark-hover);
        }

        tbody td {
            padding: 16px 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .td-name {
            color: var(--white);
            font-weight: 500;
        }

        .td-phone a {
            color: var(--gold);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .td-phone a:hover {
            opacity: 0.8;
        }

        .td-email {
            color: rgba(255, 255, 255, 0.5);
        }

        .td-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: capitalize;
            background: rgba(200, 165, 90, 0.1);
            color: var(--gold);
            border: 1px solid rgba(200, 165, 90, 0.15);
        }

        .td-message {
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .td-date {
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* ── States ── */
        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

        .state-container svg {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.12);
            margin-bottom: 20px;
        }

        .state-container p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
        }

        .state-container .error-text {
            color: #f87171;
        }

        /* Spinner */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(200, 165, 90, 0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .topbar {
                padding: 14px 20px;
            }

            .topbar-title {
                display: none;
            }

            .main {
                padding: 24px 16px;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon"><span>L</span></div>
            <span class="topbar-title"><strong>Luxe Men</strong> &middot; Admin Dashboard</span>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-label">Total Enquiries</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Franchise</div>
                <div class="stat-value" id="statFranchise">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Booking</div>
                <div class="stat-value" id="statBooking">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Partnership</div>
                <div class="stat-value" id="statPartnership">—</div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="section-header">
            <h2>Enquiries</h2>
            <button class="btn-refresh" id="refreshBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
                Refresh
            </button>
        </div>

        <div class="table-container">
            <div id="tableContent">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://luxe-salon-plvh.onrender.com';
        const token = localStorage.getItem('adminToken');

        // Auth guard
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        // DOM refs
        const tableContent = document.getElementById('tableContent');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const statTotal = document.getElementById('statTotal');
        const statFranchise = document.getElementById('statFranchise');
        const statBooking = document.getElementById('statBooking');
        const statPartnership = document.getElementById('statPartnership');

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        });

        // Refresh
        refreshBtn.addEventListener('click', fetchEnquiries);

        // Fetch enquiries
        async function fetchEnquiries() {
            showLoading();

            try {
                const response = await fetch(`${API_BASE}/api/admin/enquiries`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                });

                if (response.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = 'admin-login.html';
                    return;
                }

                const data = await response.json();

                if (response.ok && data.success) {
                    updateStats(data.data);
                    renderTable(data.data);
                } else {
                    showError(data.message || 'Failed to load enquiries.');
                }
            } catch {
                showError('Unable to connect to server.');
            }
        }

        // Update stats
        function updateStats(enquiries) {
            statTotal.textContent = enquiries.length;
            statFranchise.textContent = enquiries.filter(e => e.enquiryType === 'franchise').length;
            statBooking.textContent = enquiries.filter(e => e.enquiryType === 'booking').length;
            statPartnership.textContent = enquiries.filter(e => e.enquiryType === 'partnership').length;
        }

        // Render table
        function renderTable(enquiries) {
            if (enquiries.length === 0) {
                tableContent.innerHTML = `
          <div class="state-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="18" rx="2" />
              <line x1="2" y1="8" x2="22" y2="8" />
            </svg>
            <p>No enquiries yet</p>
          </div>`;
                return;
            }

            let rows = '';
            enquiries.forEach(e => {
                const date = new Date(e.createdAt).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                });

                rows += `
          <tr>
            <td class="td-name">${escapeHtml(e.name)}</td>
            <td class="td-phone"><a href="tel:${escapeHtml(e.phone)}">${escapeHtml(e.phone)}</a></td>
            <td class="td-email">${escapeHtml(e.email)}</td>
            <td>${escapeHtml(e.pincode || '—')}</td>
            <td><span class="td-type">${escapeHtml(e.enquiryType || '—')}</span></td>
            <td class="td-message" title="${escapeHtml(e.message || '')}">${escapeHtml(e.message || '—')}</td>
            <td class="td-date">${date}</td>
          </tr>`;
            });

            tableContent.innerHTML = `
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Pincode</th>
                <th>Enquiry Type</th>
                <th>Message</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
        }

        // Loading state
        function showLoading() {
            tableContent.innerHTML = `
        <div class="state-container">
          <div class="loading-spinner"></div>
          <p>Loading enquiries...</p>
        </div>`;
        }

        // Error state
        function showError(msg) {
            tableContent.innerHTML = `
        <div class="state-container">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <p class="error-text">${msg}</p>
        </div>`;
        }

        // Escape HTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Initial load
        fetchEnquiries();
    </script>
</body>

</html>
